

<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape The Simulation</title>


<!-- Futuristic font -->

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">


<style>

* {

    margin: 0;

    padding: 0;

    box-sizing: border-box;

}


body {

    font-family: 'Orbitron', sans-serif;

    color: white;

    height: 100vh;

    overflow: hidden;

}


/* BACKGROUND VIDEO */

video.bg {

    position: fixed;

    top: 50%;

    left: 50%;

    min-width: 100%;

    min-height: 100%;

    transform: translate(-50%, -50%);

    object-fit: cover;

    z-index: -2;

    filter: blur(10px) brightness(0.35) contrast(1.1);

}


/* DARK OVERLAY */

.overlay {

    position: fixed;

    inset: 0;

    background: rgba(0,0,0,0.55);

    z-index: -1;

}


/* CENTER WRAPPER */

.container {

    height: 100vh;

    display: flex;

    justify-content: center;

    align-items: center;

    padding: 20px;

}


/* GLASS CARD */

.card {

    width: 100%;

    max-width: 420px;

    text-align: center;

    padding: 26px;

    border-radius: 18px;

    background: rgba(255,255,255,0.06);

    backdrop-filter: blur(14px);

    border: 1px solid rgba(255,255,255,0.12);

    box-shadow: 0 10px 40px rgba(0,0,0,0.6);

}


/* TITLE */

h1 {

    font-size: 24px;

    letter-spacing: 2px;

    margin-bottom: 6px;

    text-transform: uppercase;

}


h2 {

    font-size: 12px;

    font-weight: 400;

    opacity: 0.7;

    margin-bottom: 18px;

}


/* SPOTIFY */

.spotify iframe {

    width: 100%;

    height: 152px;

    border-radius: 12px;

    margin-bottom: 18px;

}


/* ICON LINKS */

.links {

    display: flex;

    justify-content: center;

    gap: 14px;

    margin-top: 10px;

}


/* SMALLER, CLEANER BUTTONS */

.links a {

    width: 38px;

    height: 38px;

    display: inline-block;

    transition: transform 0.2s ease, filter 0.2s ease;

    filter: brightness(0.9);

}


.links a:hover {

    transform: scale(1.18);

    filter: brightness(1.2);

}


.links img {

    width: 100%;

    height: 100%;

}


/* MOBILE */

@media (max-width: 480px) {

    .card {

        max-width: 92%;

        padding: 20px;

    }


    h1 {

        font-size: 20px;

    }

}

</style>

</head>


<body>


<!-- BACKGROUND -->

<video class="bg" autoplay muted loop playsinline>

    <source src="canvas.mp4" type="video/mp4">

</video>


<div class="overlay"></div>


<div class="container">

    <div class="card">


        <h1>Escape The Simulation</h1>

        <h2>Adrian Rooz feat. Alina Luminelli</h2>


        <!-- SPOTIFY -->

        <div class="spotify">

            <iframe 

                src="https://open.spotify.com/embed/album/5XLNc36hHHszh1fliuSigS"

                frameborder="0"

                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">

            </iframe>

        </div>


        <!-- LINKS -->

        <div class="links">

            <a href="https://open.spotify.com/album/5XLNc36hHHszh1fliuSigS?si=81GudMn4She8UW8jKDyiqQ" target="_blank">

                <img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">

            </a>


            <a href="https://music.apple.com/us/song/escape-the-simulation-feat-alina-luminelli/6765772935" target="_blank">

                <img src="https://cdn-icons-png.flaticon.com/512/731/731985.png">

            </a>


            <a href="https://youtu.be/W4MJTtdNICU?si=irJtBAvY9K3nal22" target="_blank">

                <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">

            </a>

        </div>


    </div>

</div>


</body>

</html>
